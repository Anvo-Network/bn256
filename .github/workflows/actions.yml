name: actions

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, master]
jobs:
  build:
    runs-on: ${{ matrix.config.vm_image }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Ubuntu 22.04
            mode: Release
            os: ubuntu
            vm_image: ubuntu-22.04
          - name: Ubuntu 24.04
            mode: Release
            os: ubuntu
            vm_image: ubuntu-24.04
          - name: MacOS
            mode: Release
            os: macos
            vm_image: macos-latest
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: 'configure'
        run: |
          cmake -DCMAKE_BUILD_TYPE=${{ matrix.config.mode }} -Bbuild -S.
      - name: 'compile'
        run: |
          cmake --build build
      - name: 'test'
        run: |
          cd build && ctest